<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiOS Blank App</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 240px;
            height: 320px;
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
        }
        #header {
            background-color: #1a1a1a;
            color: #ff9800;
            text-align: center;
            padding: 5px 0;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #333333;
            height: 20px;
        }
        
        #main-container {
            flex: 1;
            background-color: #000000;
            box-sizing: border-box;
            position: relative;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
        }
        .page.active-page {
            display: block;
        }

        /* --- TRANG 1: MENU CHÍNH --- */
        #page-menu { padding: 14px; box-sizing: border-box; }
        .menu-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .menu-item {
            background-color: #1a1a1a; border: 2px solid #333333; border-radius: 8px;
            width: 100px; height: 100px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            font-size: 13px; font-weight: bold; color: #ffffff; box-sizing: border-box;
        }
        .menu-item .icon { font-size: 26px; margin-bottom: 4px; color: #a0a0a0; }
        .menu-item.active { background-color: #ff9800; color: #000000; border-color: #ffffff; }
        .menu-item.active .icon { color: #000000; }

        /* --- TRANG 2: TRUYỀN HÌNH (CÓ VIDEO PLAYER 16:9 TRÀN BIÊN) --- */
        #page-tv {
            position: relative;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            background-color: #000000;
        }

        /* Trình phát Video tỉ lệ 16:9 tràn 2 bên màn hình (240px x 135px) */
        .video-container {
            width: 240px;
            height: 135px;
            background-color: #111111;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Giao diện thanh Dock ở dưới cùng */
        .dock-wrapper {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 240px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            box-sizing: border-box;
            perspective: 400px; 
        }

        .nav-btn {
            width: 22px;
            height: 40px;
            background-color: #222222;
            border: 1px solid #444444;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            z-index: 10;
        }
        .nav-btn.btn-active {
            background-color: #ff9800;
            color: #000000;
            border-color: #ffffff;
        }

        .dock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 176px;
            height: 100%;
            position: relative;
        }

        .dock-item {
            width: 50px;
            height: 50px;
            border: 2px solid #444444;
            border-radius: 6px;
            background-color: #111111;
            overflow: hidden;
            position: absolute;
            transition: all 0.25s ease-in-out;
            box-sizing: border-box;
            transform: rotateY(35deg) scale(0.85);
            opacity: 0.5;
        }

        .dock-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dock-item.tv-active {
            transform: rotateY(0deg) scale(1.2);
            border-color: #ff9800;
            z-index: 5;
            opacity: 1;
            box-shadow: 0px 0px 10px rgba(255, 152, 0, 0.5);
        }

        /* --- THANH PHÍM MỀM --- */
        #softkey {
            background-color: #1a1a1a; color: #ffffff; height: 30px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px; font-size: 14px; font-weight: bold;
            border-top: 1px solid #333333; box-sizing: border-box;
        }
        #softkey-left, #softkey-right { width: 70px; }
        #softkey-left { text-align: left; }
        #softkey-right { text-align: right; }
        #softkey-center {
            text-align: center; background-color: #333333; color: #ff9800;            
            padding: 2px 12px; border-radius: 4px; min-width: 60px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="header">Menu Chính</div>
    
    <div id="main-container">
        
        <div id="page-menu" class="page active-page">
            <div class="menu-row">
                <div class="menu-item active" data-index="0">
                    <span class="icon">📺</span>
                    <span>Truyền hình</span>
                </div>
                <div class="menu-item" data-index="1">
                    <span class="icon">📻</span>
                    <span>Radio</span>
                </div>
            </div>
            <div class="menu-row">
                <div class="menu-item" data-index="2">
                    <span class="icon">📅</span>
                    <span>Chương trình</span>
                </div>
                <div class="menu-item" data-index="3">
                    <span class="icon">⭐</span>
                    <span>Yêu thích</span>
                </div>
            </div>
        </div>

        <div id="page-tv" class="page">
            <div class="video-container">
                <video id="kai-player" autoplay playsinline muted></video>
            </div>
            
            <div class="dock-wrapper">
                <div class="nav-btn" id="btn-left">&lt;</div>
                
                <div class="dock-container">
                    <div class="dock-item tv-active" data-tv="0" data-src="https://s3.ideationtec.live/Cartoon_Network/Cartoon_Network.m3u8">
                        <img src="https://huynhxuanhieu.github.io/kaios-app01/img/Cartoon-Network-Pakistan.png" alt="Cartoon Network Pakistan">
                    </div>
                    <div class="dock-item" data-tv="1" data-src="https://stream.intchoson.com/kctv/index.m3u8">
                        <img src="https://picsum.photos/100/100?random=2" alt="Kênh 2">
                    </div>
                    <div class="dock-item" data-tv="2" data-src="http://tv.arpinet.am/110/tracks-v1a1/index.m3u8">
                        <img src="https://picsum.photos/100/100?random=3" alt="Kênh 3">
                    </div>
                    <div class="dock-item" data-tv="3" data-src="http://tv.arpinet.am/40/tracks-v1a1/index.m3u8">
                        <img src="https://picsum.photos/100/100?random=4" alt="Kênh 4">
                    </div>
                </div>
                
                <div class="nav-btn" id="btn-right">&gt;</div>
            </div>
        </div>

    </div>

    <div id="softkey">
        <span id="softkey-left">Tùy chọn</span>
        <span id="softkey-center">CHỌN</span>
        <span id="softkey-right">Thoát</span>
    </div>

    <script>
        var currentPage = 'menu'; 
        var currentIndex = 0; 
        var tvIndex = 0;       
        
        var items = document.querySelectorAll('#page-menu .menu-item');
        var tvItems = document.querySelectorAll('.dock-item');
        
        var headerEl = document.getElementById('header');
        var skLeftEl = document.getElementById('softkey-left');
        var skCenterEl = document.getElementById('softkey-center');
        var skRightEl = document.getElementById('softkey-right');
        var videoPlayer = document.getElementById('kai-player');
        
        var hls = null; // Khởi tạo biến lưu trữ đối tượng Hls

        window.addEventListener('DOMContentLoaded', function() {
            window.addEventListener('keydown', handleKeyDown);
            updateFocus();
            arrangeDock(); 
        });

        function handleKeyDown(e) {
            if (currentPage === 'menu') {
                switch (e.key) {
                    case 'ArrowLeft':
                        if (currentIndex === 1 || currentIndex === 3) currentIndex -= 1;
                        updateFocus();
                        break;
                    case 'ArrowRight':
                        if (currentIndex === 0 || currentIndex === 2) currentIndex += 1;
                        updateFocus();
                        break;
                    case 'ArrowUp':
                        if (currentIndex === 2 || currentIndex === 3) currentIndex -= 2;
                        updateFocus();
                        break;
                    case 'ArrowDown':
                        if (currentIndex === 0 || currentIndex === 1) currentIndex += 2;
                        updateFocus();
                        break;
                    case 'Enter':
                        if (currentIndex === 0) navigateTo('tv');
                        break;
                    case 'SoftLeft':
                        alert('Bạn vừa mở menu Tùy chọn!');
                        break;
                    case 'SoftRight':
                        window.close();
                        break;
                }
            } 
            else if (currentPage === 'tv') {
                switch (e.key) {
                    case 'ArrowLeft':
                        moveTvDock('left');
                        break;
                    case 'ArrowRight':
                        moveTvDock('right');
                        break;
                    case 'Enter':
                        playSelectedChannel();
                        break;
                    case 'SoftRight':
                        destroyHls();
                        navigateTo('menu');
                        break;
                }
            }
        }

        function moveTvDock(direction) {
            var btnId = direction === 'left' ? 'btn-left' : 'btn-right';
            var btnEl = document.getElementById(btnId);
            btnEl.classList.add('btn-active');
            setTimeout(function() { btnEl.classList.remove('btn-active'); }, 150);

            if (direction === 'left' && tvIndex > 0) {
                tvIndex--;
            } else if (direction === 'right' && tvIndex < 3) {
                tvIndex++;
            }
            
            arrangeDock();
        }

        function arrangeDock() {
            for (var i = 0; i < tvItems.length; i++) {
                var item = tvItems[i];
                item.classList.remove('tv-active');
                
                var offset = i - tvIndex;
                var posX = offset * 35; 
                if (offset > 0) posX += 15;
                if (offset < 0) posX -= 15;
                
                var rotateY = 0;
                if (offset > 0) rotateY = -35; 
                if (offset < 0) rotateY = 35;  
                
                if (i === tvIndex) {
                    item.classList.add('tv-active');
                    item.style.transform = "translateX(" + posX + "px) rotateY(0deg) scale(1.2)";
                } else {
                    item.style.transform = "translateX(" + posX + "px) rotateY(" + rotateY + "deg) scale(0.85)";
                }
            }
        }

        // Hàm xử lý luồng m3u8 thông minh bằng Hls.js
        function playSelectedChannel() {
            var activeItem = tvItems[tvIndex];
            var streamUrl = activeItem.getAttribute('data-src');
            
            if (!streamUrl) return;

            // Xóa luồng hls cũ trước khi chạy kênh mới
            destroyHls();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play().catch(function(e) {
                        console.log("Auto-play prevented, cần tương tác người dùng: ", e);
                    });
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Lỗi mạng luồng stream, đang thử tải lại...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Lỗi Media, đang cố gắng khôi phục...");
                                hls.recoverMediaError();
                                break;
                            default:
                                destroyHls();
                                break;
                        }
                    }
                });
            } 
            // Dành cho các thiết bị Apple hoặc một số cấu hình đã tích hợp sẵn cơ chế đọc m3u8 gốc
            else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = streamUrl;
                videoPlayer.load();
                videoPlayer.play();
            }
        }

        function destroyHls() {
            if (videoPlayer) {
                videoPlayer.pause();
                videoPlayer.removeAttribute('src');
                videoPlayer.load();
            }
            if (hls) {
                hls.destroy();
                hls = null;
            }
        }

        function navigateTo(pageName) {
            currentPage = pageName;
            document.getElementById('page-menu').classList.remove('active-page');
            document.getElementById('page-tv').classList.remove('active-page');

            if (pageName === 'menu') {
                document.getElementById('page-menu').classList.add('active-page');
                headerEl.style.display = "block"; 
                headerEl.textContent = "Menu Chính";
                skLeftEl.textContent = "Tùy chọn";
                skCenterEl.textContent = "CHỌN";
                skRightEl.textContent = "Thoát";
                updateFocus();
            } else if (pageName === 'tv') {
                document.getElementById('page-tv').classList.add('active-page');
                headerEl.style.display = "none";  
                skLeftEl.textContent = ""; 
                skCenterEl.textContent = "XEM"; 
                skRightEl.textContent = "Quay lại";
                tvIndex = 0;
                arrangeDock();
                playSelectedChannel();
            }
        }

        function updateFocus() {
            for (var i = 0; i < items.length; i++) {
                if (i === currentIndex) {
                    items[i].classList.add('active');
                } else {
                    items[i].classList.remove('active');
                }
            }
        }
    </script>
</body>
</html>
